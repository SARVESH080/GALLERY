<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Photography | Portfolio</title>
<meta name="description" content="Galaxy Photography – Professional photography portfolio.">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@300;400;600&display=swap');

:root{
  --teal:#66cccc;
  --teal-glow:#00ffff;
  --text:#ffffff;
  --muted:#bdbdbd;
  --card-bg:rgba(255,255,255,0.05);
  --accent-purple:#9d4edd;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:#000;
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
.bg-wrapper{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 50%, rgba(102,204,204,0.15), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(157,78,221,0.12), transparent 50%),
    linear-gradient(180deg, #000, #0a0a0a 40%, #000);
}

/* ================= HEADER ================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:1000;
}

header a{
  font-family:'Orbitron',sans-serif;
  font-size:28px;
  color:#fff;
  text-decoration:none;
}

#menu-button{
  font-size:30px;
  cursor:pointer;
}

#menu{
  display:none;
  position:absolute;
  top:80px;
  right:40px;
  background:#050505;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(102,204,204,0.2);
}

#menu button{
  background:none;
  border:none;
  color:#fff;
  padding:14px 30px;
  width:100%;
  text-align:left;
  cursor:pointer;
}

#menu button:hover{
  background:rgba(102,204,204,0.15);
}

/* ================= SECTIONS ================= */
main{width:100%;}

section{display:none;}
section.active{display:block;}

/* ================= HOME ================= */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:url('mountain2.jpg') center/cover no-repeat;
  opacity:0.25;
}

.hero-content{
  position:relative;
  z-index:1;
}

.hero h1{
  font-family:'Orbitron',sans-serif;
  font-size:64px;
  background:linear-gradient(135deg,#fff,var(--teal),var(--accent-purple));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  margin-top:20px;
  color:var(--muted);
  letter-spacing:2px;
}

.view-button{
  margin-top:40px;
  padding:16px 48px;
  border-radius:50px;
  border:2px solid var(--teal);
  background:transparent;
  color:var(--teal);
  cursor:pointer;
}

/* ================= GALLERY ================= */
#gallery{
  padding:60px 40px;
  max-width:1400px;
  margin:auto;
}

#gallery h2{
  text-align:center;
  font-family:'Orbitron',sans-serif;
  font-size:42px;
  margin-bottom:40px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:30px;
}

.gallery-item{
  border-radius:18px;
  overflow:hidden;
}

.gallery-item img{
  width:100%;
  height:280px;
  object-fit:cover;
  cursor:pointer;
}

/* ================= ABOUT ================= */
#about{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
}

.about-card{
  max-width:700px;
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  padding:50px;
  border-radius:24px;
  text-align:center;
}

.about-card h3{
  font-family:'Orbitron',sans-serif;
  font-size:36px;
  color:var(--teal);
  margin-bottom:20px;
}

.about-card p{
  color:#ddd;
  line-height:1.8;
  margin-bottom:16px;
}

/* ================= LIGHTBOX ================= */
#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

#lightbox img{
  max-width:90vw;
  max-height:90vh;
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:25px;
  color:#aaa;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  header{padding:16px 24px;}
  .hero h1{font-size:42px;}
  .gallery-item img{height:200px;}
}
</style>
</head>

<body>

<div class="bg-wrapper"></div>

<header>
  <a href="#" id="logo">Galaxy</a>
  <div id="menu-button">☰</div>
  <div id="menu">
    <button data-target="home">Home</button>
    <button data-target="gallery">Portfolio</button>
    <button data-target="about">About</button>
  </div>
</header>

<main>

<!-- HOME -->
<section id="home" class="active">
  <div class="hero">
    <div class="hero-content">
      <h1>Galaxy Photography</h1>
      <p>Fine Art • Street • Cosmic Moments</p>
      <button class="view-button" id="viewGallery">View Portfolio</button>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>Portfolio</h2>
  <div class="gallery">
    <div class="gallery-item"><img src="budhha.jpeg"></div>
    <div class="gallery-item"><img src="mountain2.jpg"></div>
    <div class="gallery-item"><img src="photo3.jpeg"></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="about-card">
    <h3>About Me</h3>
    <p>I’m a passionate photographer capturing emotions and stories through light.</p>
    <p>📍 India<br>📸 Mobile Photography<br>🌌 Street • Portrait • Nature</p>
  </div>
</section>

</main>

<div id="lightbox"><img></div>

<footer>
  Instagram • LinkedIn
</footer>

<script>
const menuBtn=document.getElementById('menu-button');
const menu=document.getElementById('menu');
const sections=document.querySelectorAll('section');

menuBtn.onclick=()=>menu.style.display=menu.style.display==='block'?'none':'block';

menu.querySelectorAll('button').forEach(btn=>{
  btn.onclick=()=>{
    sections.forEach(s=>s.classList.remove('active'));
    document.getElementById(btn.dataset.target).classList.add('active');
    menu.style.display='none';
    window.scrollTo(0,0);
  }
});

document.getElementById('viewGallery').onclick=()=>{
  sections.forEach(s=>s.classList.remove('active'));
  document.getElementById('gallery').classList.add('active');
  window.scrollTo(0,0);
};

document.getElementById('logo').onclick=(e)=>{
  e.preventDefault();
  sections.forEach(s=>s.classList.remove('active'));
  document.getElementById('home').classList.add('active');
};
</script>

</body>
</html>
